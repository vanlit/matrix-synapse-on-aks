apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: matrix
  namespace: matrix-argocd

spec:
  project: default

  source:
    repoURL: https://github.com/vanlit/matrix-synapse-on-aks.git
    targetRevision: main
    path: apps/40-matrix
    directory:
      recurse: false
      jsonnet: {}
      exclude: "**/*.tpl"

  destination:
    server: https://kubernetes.default.svc
    namespace: matrix-argocd