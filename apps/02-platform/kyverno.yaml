apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: matrix-argocd
spec:
  project: default

  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno

  source:
    repoURL: https://kyverno.github.io/kyverno/
    chart: kyverno
    targetRevision: 3.5.2

    helm:
      releaseName: kyverno
      values: |
        installCRDs: true


  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true