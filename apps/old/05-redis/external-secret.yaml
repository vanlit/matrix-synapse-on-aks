apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: redis-auth
  namespace: redis

spec:
  refreshInterval: 1h

  secretStoreRef:
    kind: ClusterSecretStore
    name: azure-keyvault

  target:
    name: redis-auth
    creationPolicy: Owner

  data:
    - secretKey: redis-password
      remoteRef:
        key: redis-password