apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: matrix-argocd
spec:
  project: default

  source:
    repoURL: git@github.com:vanlit/matrix-synapse-on-aks.git
    targetRevision: main
    path: infra

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true