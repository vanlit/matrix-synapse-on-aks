apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: matrix-argocd

spec:
  project: default

  source:
    repoURL: https://traefik.github.io/charts
    chart: traefik
    targetRevision: 41.0.0

    helm:
      values: |
        deployment:
          replicas: 1

        service:
          type: LoadBalancer
          annotations:
            service.beta.kubernetes.io/azure-pip-name: matrix-traefik-ip
            service.beta.kubernetes.io/azure-load-balancer-resource-group: matrix-rg

        ports:
          web:
            exposedPort: 80
          websecure:
            exposedPort: 443

        ingressRoute:
          dashboard:
            enabled: true

        providers:
          kubernetesCRD:
            enabled: true
          kubernetesIngress:
            enabled: true

        logs:
          general:
            level: INFO

        metrics:
          prometheus:
            enabled: true

        additionalArguments:
          - "--entrypoints.web.address=:80"
          - "--entrypoints.websecure.address=:443"

          # ACME / Let's Encrypt
          - "--certificatesresolvers.le.acme.email=admin@wanil.pl"
          - "--certificatesresolvers.le.acme.storage=/data/acme.json"
          - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"

        # =========================
        # Ensure pod gets volume mounted
        # =========================
        deployment:
          initContainers: []

        additionalVolumeMounts:
          - name: traefik-acme
            mountPath: /data

        additionalVolumes:
          - name: traefik-acme
            persistentVolumeClaim:
              claimName: traefik-acme

        persistence:
          enabled: true
          path: /data
          size: 128Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: traefik

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true