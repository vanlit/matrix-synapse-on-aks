apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd
  namespace: matrix-argocd

spec:
  entryPoints:
    - web
    - websecure

  routes:
    - kind: Rule
      match: Host(`argocd.wanil.pl`)
      services:
        - name: argocd-server
          port: 80

  tls:
    certResolver: myresolver