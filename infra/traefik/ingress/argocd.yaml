apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd
  namespace: matrix-argocd

spec:
  entryPoints:
    - web:
      address: ":80"
    - websecure:
      address: ":443"

  routes:
    - match: Host(`argocd.wanil.pl`)
      kind: Rule
      services:
        - name: argocd-server
          port: 80

  tls:
    certResolver: le